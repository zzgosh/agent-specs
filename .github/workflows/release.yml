name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure this workflow runs from main
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "This workflow must be run from the main branch."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm for OIDC trusted publishing support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Read package metadata
        id: package
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"

          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.package.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.package.outputs.tag }} already exists on origin."
            exit 1
          fi

      - name: Ensure package version is not already published
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "Package ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published."
            exit 1
          fi

      - name: Publish package to npm
        run: npm publish --provenance --access public

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.package.outputs.tag }}" -m "${{ steps.package.outputs.tag }}"
          git push origin "${{ steps.package.outputs.tag }}"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate release notes with Claude
        id: generate-notes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_BASE_URL: https://openrouter.ai/api
        run: |
          set -euo pipefail

          TAG="${{ steps.package.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p' || echo "")

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE=""
          fi

          if [ -n "$RANGE" ]; then
            GIT_LOG=$(git log --oneline "$RANGE")
            DIFF_STAT=$(git diff --stat "$RANGE")
          else
            GIT_LOG=$(git log --oneline)
            DIFF_STAT="首次发布"
          fi

          claude -p --max-turns 1 --model anthropic/claude-sonnet-4.6 "
          你是 release notes 生成器。请根据以下 git 变更信息，为 ${TAG} 版本生成简洁自然的 release notes。

          项目：${{ steps.package.outputs.name }}（CLI for managing AGENTS.md files）

          Git commits:
          ${GIT_LOG}

          文件变更统计:
          ${DIFF_STAT}

          要求：
          - 用简洁自然的中文描述变更内容，面向使用者
          - 适当分类（如 ✨ 新功能 / 🐛 修复 / 🔧 改进 / 📦 发布与构建）
          - 不要暴露 commit hash 或 PR 编号
          - 输出纯 Markdown，不要用代码块包裹
          - 不超过 300 字
          " > /tmp/release-notes.md || true

          # 如果 Claude 生成失败，使用默认内容
          if [ ! -s /tmp/release-notes.md ]; then
            echo "已发布 \`${{ steps.package.outputs.name }}\` ${TAG} 到 npm。" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.package.outputs.tag }}" \
            --verify-tag \
            --title "${{ steps.package.outputs.tag }}" \
            --notes-file /tmp/release-notes.md
